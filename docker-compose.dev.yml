services:
  postgres:
    image: postgres:16-alpine
    container_name: car-rental-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build:
      context: .
      target: dev
    env_file:
      - .env
    volumes:
      - .:/app
    ports:
      - "${BACKEND_PORT}:5000"
    environment:
      FLASK_ENV: ${FLASK_ENV}
      FLASK_DEBUG: ${FLASK_DEBUG}
      PYTHONPATH: ${PYTHONPATH}
      DATABASE_URL: ${DATABASE_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - postgres
    command: [ "gunicorn", "app:create_app()", "--bind", "0.0.0.0:5000", "--reload", "--access-logfile", "-", "--error-logfile", "-" ]

  frontend:
    build:
      context: ../CarRentalUI
    container_name: car-rental-frontend
    volumes:
      - ../CarRentalUI:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT}:4200"
    depends_on:
      - backend
    command: npm start -- --host 0.0.0.0 --poll=2000

  swagger:
    image: swaggerapi/swagger-ui
    container_name: car-rental-swagger
    ports:
      - "${SWAGGER_PORT}:8080"
    environment:
      SWAGGER_JSON_URL: http://localhost:${BACKEND_PORT}/openapi.json
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    container_name: car-rental-n8n
    env_file:
      - .env
    ports:
      - "${N8N_PORT}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: ${POSTGRES_PORT}
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: http
      NODE_ENV: development
    depends_on:
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: car-rental-pgadmin
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "${PGADMIN_PORT}:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgdata:
  n8n_data:
  pgadmin_data:
